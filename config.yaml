data:
  max_token_len: 200
  image_height: 64
  max_image_width: 672
  patch_size: 16

model:
  tokenizer_name: "Qwen/Qwen2.5-Coder-1.5B"
  embed_dim: 768
  num_heads: 12
  num_layers: 12
  mlp_ratio: 4
  dropout: 0.1
  bridge_out_dim: 1536
  lora_rank: 32
  lora_alpha: 64
  lora_dropout: 0.05

train:
  pretrain_epochs: 5
  lora_finetune_epochs: 10
  batch_size: 2
  grad_accum: 16           # effective batch = 2 * 2 GPUs * 16 = 64
  pretrain_lr: 1.0e-4
  lora_finetune_lr: 5.0e-5
  weight_decay: 0.01
  max_grad_norm: 1.0
  log_steps: 10
  eval_steps: 1000
  save_steps: 1000
  eval_samples: 200
  num_workers: 4
  seed: 42

paths:
  ckpt_dir: "checkpoints"
