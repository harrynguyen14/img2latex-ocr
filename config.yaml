data:
  max_token_len: 200
  image_height: 64
  max_image_width: 672
  patch_size: 16

model:
  tokenizer_name: "Qwen/Qwen2.5-Coder-1.5B"
  embed_dim: 768
  num_heads: 12
  num_layers: 12
  mlp_ratio: 4
  dropout: 0.1
  bridge_out_dim: 1536
  lora_rank: 64
  lora_alpha: 128
  lora_dropout: 0.05

train:
  stage1_epochs: 5
  stage2_epochs: 10
  batch_size: 3       # giảm do OOM; effective batch = 3*2*11 = 66
  grad_accum: 11      # giữ effective batch ≈ 64
  lr_stage1: 1.0e-4
  lr_stage2: 5.0e-5
  weight_decay: 0.01
  max_grad_norm: 1.0
  eval_steps: 1000
  save_steps: 1000
  eval_samples: 200
  num_workers: 4      # tăng từ 2 → 4 để tránh CPU bottleneck
  seed: 42
  report_to: "tensorboard"   # hoặc "wandb"

paths:
  ckpt_dir: "checkpoints"
